name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
    
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish App
        run: dotnet publish FieldToFortune.Web/FieldToFortune.Web.csproj -c Release -o release

      - name: Rewrite base href
        run: sed -i 's/<base href=".*" \/>/<base href="\/FieldToFortune\/" \/>/g' release/wwwroot/index.html

      - name: Add .nojekyll and 404.html
        run: |
          touch release/wwwroot/.nojekyll
          cp release/wwwroot/index.html release/wwwroot/404.html
          sed -i 's/<base href=".*" \/>/<base href="\/FieldToFortune\/" \/>/g' release/wwwroot/index.html
          sed -i 's/<base href=".*" \/>/<base href="\/FieldToFortune\/" \/>/g' release/wwwroot/404.html

      - name: Commit to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: github-pages
